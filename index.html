<!DOCTYPE html>

<head>
    <title>Test Website</title>
    <link rel="stylesheet" href="styles.css">
</head>

<html>
<body>
    <script src="interactjsFiles/interact.js"></script>
    <script type="module" src="main-code.js"></script>

    <div class="sideBar">
        <a class="sideButton" id="createNoteButton" tabindex="0">Create note</a>
        <a class="sideButton" id="uploadImageButton" tabindex="0">Upload image</a>
        <div class="sideButton">
            <a id="inertiaButtonID" tabindex="0">Inertia</a>
            <div id="inertiaButton"></div>
        </div>
        <div class="sideButton">
            <a id="cutButtonID" tabindex="0">Cut strings</a>
            <div id="cutButton"></div>
        </div>
    </div>
    <div id="viewport">
        <div id="zoomSpace">
            <div id="corkboard" class="corkdrag">
                <svg id="string"></svg>
            </div>
        </div>
    </div>
    <dialog id="modalOverlay" class="hidden">
        <span id="editNoteBox" role="dialog" aria-label="Edit note window" aria-modal="true">
            <div class="modalTextSection">
                <label class="modalTextLabel" for="modalTextInput">Edit Note Text</label>
                <textarea id="modalTextInput"></textarea>
            </div>
            <div class="modalColourSection">
                <label class="modalColourSelectorLabel" for="modalColourSelector">Select Note Colour</label>
                <div class="modalColourPicker" id="modalColourSelector"></div>
            </div>
            <div>
                <button id="cancelNoteEditButton">Cancel</button>
                <button id="applyNoteEditButton">Apply</button>
            </div>
        </span>
    </dialog>
</body>
</html>
